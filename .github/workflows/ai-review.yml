name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          coverage run -m pytest tests/ -v
          coverage report -m

  ai-review:
    runs-on: ubuntu-latest
    needs: tests

    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- '*.py' > diff.txt || true
          echo "diff_size=$(wc -c < diff.txt)" >> $GITHUB_OUTPUT

      - name: AI Code Review (ChatGPT)
        if: steps.diff.outputs.diff_size != '0'
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const fs = require('fs');

            const diff = fs.readFileSync('diff.txt', 'utf8').slice(0, 8000);

            if (!diff || diff.trim().length === 0) {
              console.log("No diff to review");
              return;
            }

            const response = await fetch("https://api.openai.com/v1/chat/completions", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${process.env.OPENAI_API_KEY}`
              },
              body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                  {
                    role: "system",
                    content: "Ты senior Python разработчик. Найди уязвимости, логические ошибки, проблемы производительности, нарушения best practices.Верни список проблем с объяснением и предложениями исправлений."
                  },
                  {
                    role: "user",
                    content: `Проведи code review этого diff:\n\n\`\`\`diff\n${diff}\n\`\`\``
                  }
                ],
                temperature: 0.2
              })
            });

            const data = await response.json();

            const review =
              data?.choices?.[0]?.message?.content ||
              "AI review unavailable";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## AI Code Review (ChatGPT)\n\n${review}`
            });