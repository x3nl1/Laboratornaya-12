name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          coverage run -m pytest tests/ -v
          coverage report -m

  ai-review:
    runs-on: ubuntu-latest
    needs: run-tests
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- '*.py' > code_diff.txt
          echo "diff_size=$(wc -c < diff.txt)" >> $GITHUB_OUTPUT

      - name: AI code review via Gemini
        if: steps.diff.outputs.diff_size != '0'
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('code_diff.txt', 'utf8').slice(0, 8192);

            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{
                    parts: [{
                      text: `Ты опытный Python-разработчик с фокусом на качество кода, производительность и безопасность. Проведи code review следующего diff. Верни список проблем (если они есть) с объяснением и предложениями по исправлению. Если diff чистый, напиши "✅ Замечаний нет.

            \`\`\`diff
            ${diff}
            \`\`\``
                    }]
                  }]
                })
              }
            );

            const data = await response.json();
            const review = data.candidates?.[0]?.content?.parts?.[0]?.text ?? '⚠️ AI review временно недоступен (попробуйте позже)';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Code Review (Gemini 1.5 Flash)\n\n${review}`
            });

